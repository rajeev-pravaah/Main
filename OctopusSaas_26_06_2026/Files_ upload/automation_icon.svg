<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#4CAF50"/>

  <!-- Gear shape -->
  <g fill="#ffffff">
    <circle cx="100" cy="100" r="35"/>
    <rect x="95" y="20" width="10" height="30"/>
    <rect x="95" y="150" width="10" height="30"/>
    <rect x="20" y="95" width="30" height="10"/>
    <rect x="150" y="95" width="30" height="10"/>
  </g>

  <!-- Check mark -->
  <polyline points="70,105 90,125 130,75"
            fill="none"
            stroke="#4CAF50"
            stroke-width="10"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
